name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: oven-sh/setup-bun@v2
      - name: Install Python image dependency
        run: python -m pip install "Pillow>=10,<13"
      - name: Full network-free suite
        run: npm test
      - name: Cross-platform offline install smoke
        run: npm run smoke:install
      - name: Exact-tree npx and bunx installer smokes
        if: runner.os == 'Linux'
        run: |
          archive="$(npm pack --silent)"
          npx_target="$(mktemp -d)/npx/HeiTuzimgGen2"
          bunx_target="$(mktemp -d)/bunx/HeiTuzimgGen2"
          npx --yes "./$archive" -- --target "$npx_target"
          bunx --package "$PWD/$archive" heituz-imggen2 -- --target "$bunx_target"
          test -f "$npx_target/SKILL.md"
          test -f "$npx_target/contracts/v1/image-production-handoff.schema.json"
          test -f "$bunx_target/SKILL.md"
          test -f "$bunx_target/contracts/v1/image-production-handoff.schema.json"
      - name: Packed installer smoke on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = npm pack --silent
          $target = Join-Path $env:RUNNER_TEMP "packed HeiTuzImgGen2 한글"
          npx --yes "./$archive" -- --offline --no-register --target "$target"
          if (-not (Test-Path (Join-Path $target "SKILL.md"))) { throw "SKILL.md missing" }
